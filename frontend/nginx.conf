server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Use Docker's embedded DNS so upstream hostnames resolve per-request,
    # not once at startup. Prevents stale IPs after container restarts.
    resolver 127.0.0.11 valid=10s;

    # API proxy
    location /api/ {
        set $api http://api:8080;
        proxy_pass $api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Short codes & unknown paths → backend
    location / {
        try_files $uri $uri/ @backend;
    }

    location @backend {
        set $api http://api:8080;
        proxy_pass $api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}