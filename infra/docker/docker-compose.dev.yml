
services:
  api:
    build:
      context: ../../backend
      dockerfile: Dockerfile.dev
    ports:
      - 8080:8080
    environment:
      - PORT=${PORT}
      - BASE_URL=${BASE_URL}
      - DATABASE_URL=${DATABASE_URL}
      - ENV=development
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS}
      
    volumes:
      - ../../backend:/app
      - go-mod-cache:/go/pkg/mod
    working_dir: /app
    command: /go/bin/air -c .air.toml
    healthcheck: {}
        
  frontend:
    build: !reset null
    ports:
      - 5173:5173
    image: node:20-alpine
    volumes:
      - ../../frontend:/app
      - node-modules:/app/node_modules
    working_dir: /app
    command: sh -c "corepack enable && 
                    corepack prepare pnpm@latest --activate &&
                    pnpm install &&
                    pnpm run dev -- --host 0.0.0.0"
    environment:
      - VITE_API_URL=http://localhost:8080
      - BASE_URL=http://localhost:3000
    healthcheck: {}
    depends_on:
      api:
        condition: service_started
    

  db:
    ports:
      - 5433:5432
  cache:
    ports:
      - 6379:6379

volumes:
  go-mod-cache:
  node-modules: