
services:
  api:
    image: golang:1.25-alpine
    build: null
    ports:
      - 8080:8080
    environment:
      - PORT=${PORT}
      - BASE_URL=${BASE_URL}
      - DATABASE_URL=${DATABASE_URL}
      - ENV=development
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS}
    volumes:
      - ../../backend:/app
      - go-mod-cache:/go/pkg/mod
    working_dir: /app
    command: sh -c "go install github.com/air-verse/air@latest && /go/bin/air -c .air.toml"
    healthcheck: {}
        
  frontend:
    build: null
    ports:
      - 5173:5173
    image: node:20-alpine
    volumes:
      - ../../frontend:/app
      - node-modules:/app/node_modules
    working_dir: /app
    command: sh -c "npm install && npm run dev"
    environment:
      - VITE_API_URL=http://localhost:8080
      - BASE_URL=http://localhost:3000
    healthcheck: {}
    depends_on:
      api:
        condition: service_started
    

  db:
    ports:
      - 5433:5432
  cache:
    ports:
      - 6379:6379

volumes:
  go-mod-cache:
  node-modules: